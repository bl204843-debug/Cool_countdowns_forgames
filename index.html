<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Live countdown to game shutdowns">
    <meta name="theme-color" content="#667eea">
    <title>Game Shutdown Countdowns</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Main View */
        .main-view {
            text-align: center;
            animation: slideIn 0.8s ease-out;
        }

        .main-view.hidden {
            display: none;
        }

        /* Games List View */
        .games-list-view {
            display: none;
            animation: slideIn 0.8s ease-out;
        }

        .games-list-view.active {
            display: block;
        }

        /* Countdown View */
        .countdown-view {
            display: none;
            animation: slideIn 0.8s ease-out;
        }

        .countdown-view.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .countdown-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #fff;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .countdown-display {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 40px 0;
        }

        .time-unit {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        .time-unit:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .number {
            font-size: 3.5em;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .label {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.1em;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .status {
            font-size: 1.8em;
            color: #fff;
            margin: 40px 0 20px;
            min-height: 40px;
        }

        .status.countdown {
            color: rgba(0, 255, 136, 0.9);
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .status.ended {
            color: #ff6b6b;
            font-weight: bold;
            animation: pulse 1s infinite;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95em;
            margin-top: 30px;
            line-height: 1.6;
        }

        .info-item {
            margin: 10px 0;
        }

        .emoji {
            font-size: 1.3em;
            margin-right: 8px;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-back {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid #667eea;
            padding: 10px 30px;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn-back:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        /* Games List */
        .games-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .game-card-title {
            color: #fff;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .game-card-date {
            color: #ff6b6b;
            font-size: 0.9em;
            font-weight: 500;
        }

        .games-title {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
        }

        .games-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        /* RecRoom Specific */
        .recroom-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 1200px) {
            .countdown-content {
                max-width: 100%;
                padding: 40px 25px;
            }

            .recroom-content {
                max-width: 100%;
                padding: 40px 25px;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .countdown-display {
                grid-template-columns: repeat(2, 1fr);
            }

            .number {
                font-size: 2.5em;
            }

            .games-title {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <!-- Main View -->
        <div class="main-view" id="mainView">
            <div class="recroom-content">
                <h1>🎮 RecRoom Shutdown 🎮</h1>
                <div class="subtitle">Time Until Closure</div>
                
                <div class="countdown-display">
                    <div class="time-unit">
                        <div class="number" id="days">0</div>
                        <div class="label">Days</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="hours">0</div>
                        <div class="label">Hours</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="minutes">0</div>
                        <div class="label">Minutes</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="seconds">0</div>
                        <div class="label">Seconds</div>
                    </div>
                </div>

                <div class="status countdown" id="status"></div>
                
                <div class="info">
                    <div class="info-item">
                        <span class="emoji">⏱️</span>
                        <span id="date-display">Loading...</span>
                    </div>
                    <div class="info-item">
                        <span class="emoji">🌍</span>
                        <span>UTC Timezone</span>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="showGamesList()">➕ More EA Games</button>
                </div>
            </div>
        </div>

        <!-- Games List View -->
        <div class="games-list-view" id="gamesListView">
            <button class="btn btn-back" onclick="backToMain()">← Back</button>
            <div class="games-container">
                <div style="text-align: center; margin-bottom: 40px;">
                    <div class="games-title">🎮 EA Game Shutdowns 2026</div>
                    <div class="games-subtitle">Click on any game to see countdown</div>
                </div>
                
                <div id="gamesList"></div>
            </div>
        </div>

        <!-- Countdown View -->
        <div class="countdown-view" id="countdownView">
            <button class="btn btn-back" onclick="backToGamesList()">← Back to Games</button>
            <div class="countdown-content" style="margin-top: 20px;">
                <h1 id="countdownTitle">Game Name</h1>
                <div class="subtitle" id="countdownSubtitle">Time Until Shutdown</div>
                
                <div class="countdown-display">
                    <div class="time-unit">
                        <div class="number" id="countdownDays">0</div>
                        <div class="label">Days</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="countdownHours">0</div>
                        <div class="label">Hours</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="countdownMinutes">0</div>
                        <div class="label">Minutes</div>
                    </div>
                    <div class="time-unit">
                        <div class="number" id="countdownSeconds">0</div>
                        <div class="label">Seconds</div>
                    </div>
                </div>

                <div class="status countdown" id="countdownStatus"></div>
                
                <div class="info">
                    <div class="info-item">
                        <span class="emoji">⏱️</span>
                        <span id="countdownDateDisplay">Loading...</span>
                    </div>
                    <div class="info-item">
                        <span class="emoji">🌍</span>
                        <span>UTC Timezone</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const eaGames = [
            { title: 'Anthem', date: '2026-01-12' },
            { title: 'The Sims Mobile', date: '2026-01-24' },
            { title: 'NBA Live 19', date: '2026-01-30' },
            { title: 'Real Racing 3', date: '2026-03-19' },
            { title: 'Plants vs. Zombies: Garden Warfare (PS3)', date: '2026-04-28' },
            { title: 'EA Sports FC Tactical', date: '2026-05-07' },
            { title: 'Madden NFL 23', date: '2026-07-13' },
            { title: 'Apex Legends (Switch)', date: '2026-08-04' },
            { title: 'NHL 22 & NHL 23', date: '2026-08-31' }
        ];

        let selectedGame = null;
        let countdownIntervals = {};

        // Create starfield background
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Format date
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZoneName: 'short'
            };
            return date.toLocaleDateString('en-US', options);
        }

        // RecRoom Countdown
        const recRoomDate = new Date('2026-06-01 00:00:00 UTC').getTime();

        function updateRecRoomCountdown() {
            const now = new Date().getTime();
            const difference = recRoomDate - now;

            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const statusEl = document.getElementById('status');

            if (difference > 0) {
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                daysEl.textContent = String(days).padStart(2, '0');
                hoursEl.textContent = String(hours).padStart(2, '0');
                minutesEl.textContent = String(minutes).padStart(2, '0');
                secondsEl.textContent = String(seconds).padStart(2, '0');

                statusEl.textContent = '⏱️ Counting down...';
                statusEl.className = 'status countdown';
            } else {
                daysEl.textContent = '00';
                hoursEl.textContent = '00';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';

                statusEl.textContent = '💀 RecRoom has been shut down!';
                statusEl.className = 'status ended';
            }
        }

        // Game Countdown
        function updateGameCountdown(gameDate) {
            const now = new Date().getTime();
            const gameTime = new Date(gameDate + ' 00:00:00 UTC').getTime();
            const difference = gameTime - now;

            const daysEl = document.getElementById('countdownDays');
            const hoursEl = document.getElementById('countdownHours');
            const minutesEl = document.getElementById('countdownMinutes');
            const secondsEl = document.getElementById('countdownSeconds');
            const statusEl = document.getElementById('countdownStatus');

            if (difference > 0) {
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                daysEl.textContent = String(days).padStart(2, '0');
                hoursEl.textContent = String(hours).padStart(2, '0');
                minutesEl.textContent = String(minutes).padStart(2, '0');
                secondsEl.textContent = String(seconds).padStart(2, '0');

                statusEl.textContent = '⏱️ Counting down...';
                statusEl.className = 'status countdown';
            } else {
                daysEl.textContent = '00';
                hoursEl.textContent = '00';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';

                statusEl.textContent = '💀 Game has been shut down!';
                statusEl.className = 'status ended';
            }

            document.getElementById('countdownDateDisplay').textContent = formatDate(gameTime);
        }

        // Navigation
        function showGamesList() {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('gamesListView').classList.add('active');
            renderGamesList();
        }

        function backToMain() {
            document.getElementById('gamesListView').classList.remove('active');
            document.getElementById('mainView').classList.remove('hidden');
        }

        function showCountdown(game) {
            selectedGame = game;
            document.getElementById('gamesListView').classList.remove('active');
            document.getElementById('countdownView').classList.add('active');
            
            document.getElementById('countdownTitle').textContent = '🎮 ' + game.title;
            
            // Clear previous interval if exists
            if (countdownIntervals.game) {
                clearInterval(countdownIntervals.game);
            }
            
            updateGameCountdown(game.date);
            countdownIntervals.game = setInterval(() => updateGameCountdown(game.date), 1000);
        }

        function backToGamesList() {
            if (countdownIntervals.game) {
                clearInterval(countdownIntervals.game);
            }
            document.getElementById('countdownView').classList.remove('active');
            document.getElementById('gamesListView').classList.add('active');
        }

        function renderGamesList() {
            const gamesList = document.getElementById('gamesList');
            gamesList.innerHTML = '';
            
            eaGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => showCountdown(game);
                card.innerHTML = `
                    <div class="game-card-title">${game.title}</div>
                    <div class="game-card-date">📅 ${new Date(game.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
                `;
                gamesList.appendChild(card);
            });
        }

        // Initialize
        createStars();
        updateRecRoomCountdown();
        document.getElementById('date-display').textContent = formatDate(recRoomDate);
        
        setInterval(updateRecRoomCountdown, 1000);
    </script>
</body>
</html>
